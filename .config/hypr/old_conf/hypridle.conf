listener {
  timeout = 10
  on-timeout =  ~/dotfiles/bin/manage_processes.sh suspend vesktop
  on-resume = ~/dotfiles/bin/manage_processes.sh resume vesktop
}

# SLEEP AND LOCK

listener {
  timeout = 300
  on-timeout = ~/dotfiles/bin/lock.sh
}

listener {
  timeout = 600
  on-timeout =  /usr/bin/systemctl suspend
}
